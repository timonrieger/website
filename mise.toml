[tools]
uv = "latest"
python = "3.14"
hugo = "0.161.1"
go = "1.26.1"

[tasks.lint]
run = "uvx pre-commit run --all-files"
description = "Run pre-commit hooks"

[tasks."lint:fix"]
run = "uvx pre-commit run --all-files || true"
description = "Run pre-commit hooks without failing"

[tasks.setup]
run = ["mise install", "uvx pre-commit install"]
description = "Setup the project"

[tasks.dev]
description = "Start Hugo development server, use hugo flags to customize (e.g. mise run dev -- --buildDrafts)"
run = "hugo server"

[tasks."theme:add:papermod"]
description = "Add PaperMod theme as submodule"
run = "git submodule add --depth=1 https://github.com/adityatelange/hugo-PaperMod.git themes/PaperMod"

[tasks."theme:init"]
description = "Initialize and update git submodules (needed when recloning repo)"
run = "git submodule update --init --recursive"

[tasks."theme:update"]
description = "Update theme submodule to latest version"
run = "git submodule update --remote --merge"

[tasks."new:blog"]
description = "Create a new blog post"
usage = 'arg "<title>" help="Filename for the new blog post"'
run = 'hugo new blog/$usage_title'

[tasks."new:project"]
description = "Create a new project"
usage = 'arg "<title>" help="Filename for the new project"'
run = 'hugo new projects/$usage_title'

[tasks."new:page"]
description = "Create a new single page"
usage = 'arg "<title>" help="Filename for the new page (without .md)"'
run = 'hugo new $usage_title.md'

[tasks.reads]
description = "Run the reads script"
run = "uv run scripts/reads.py"
